name: Inbound Speed-to-Lead

on:
  workflow_dispatch:
    inputs:
      contact_id:
        description: HubSpot contact ID
        required: true
        type: string
      contact_email:
        description: Contact email address (for DLQ / notifications)
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch HubSpot data
        run: python scripts/fetch_hubspot.py
        env:
          INPUT_CONTACT_ID: ${{ github.event.inputs.contact_id }}
          INPUT_CONTACT_EMAIL: ${{ github.event.inputs.contact_email }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          RUNNER_TEMP: ${{ runner.temp }}

      - name: Enrich contact
        run: python scripts/enrich_contact.py
        env:
          INPUT_CONTACT_ID: ${{ github.event.inputs.contact_id }}
          INPUT_CONTACT_EMAIL: ${{ github.event.inputs.contact_email }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          ZOOMINFO_USERNAME: ${{ secrets.ZOOMINFO_USERNAME }}
          ZOOMINFO_PASSWORD: ${{ secrets.ZOOMINFO_PASSWORD }}
          RUNNER_TEMP: ${{ runner.temp }}

      - name: Compute campaign tokens
        run: python scripts/compute_campaign_tokens.py
        env:
          RUNNER_TEMP: ${{ runner.temp }}

      - name: Generate campaign
        run: python scripts/generate_campaign.py
        env:
          INPUT_CONTACT_ID: ${{ github.event.inputs.contact_id }}
          INPUT_CONTACT_EMAIL: ${{ github.event.inputs.contact_email }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUNNER_TEMP: ${{ runner.temp }}

      - name: Write back to HubSpot
        run: python scripts/write_hubspot.py
        env:
          INPUT_CONTACT_ID: ${{ github.event.inputs.contact_id }}
          INPUT_CONTACT_EMAIL: ${{ github.event.inputs.contact_email }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          RUNNER_TEMP: ${{ runner.temp }}

      - name: Upload output artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-output-${{ github.event.inputs.contact_id }}
          path: ${{ runner.temp }}/campaign_output.json
          retention-days: 7

      - name: Copy failed contacts log
        if: failure()
        run: cp "${{ runner.temp }}/failed_contacts.json" failed_contacts.json 2>/dev/null || echo '{}' > failed_contacts.json

      - name: Upload failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-contacts-${{ github.event.inputs.contact_id }}
          path: failed_contacts.json
          retention-days: 7

      - name: Notify Teams on failure
        if: failure()
        run: |
          FAILED_STEP=$(cat "${{ runner.temp }}/failed_contacts.json" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed_step','unknown'))" 2>/dev/null || echo "unknown")
          ERROR_MSG=$(cat "${{ runner.temp }}/failed_contacts.json" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error_message','')[:300])" 2>/dev/null || echo "")
          curl -s -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"@type\": \"MessageCard\",
              \"@context\": \"https://schema.org/extensions\",
              \"summary\": \"Inbound pipeline failed\",
              \"themeColor\": \"FF0000\",
              \"title\": \"Inbound pipeline failed — ${{ github.event.inputs.contact_email }}\",
              \"sections\": [{
                \"facts\": [
                  {\"name\": \"Contact\", \"value\": \"${{ github.event.inputs.contact_email }}\"},
                  {\"name\": \"Failed step\", \"value\": \"${FAILED_STEP}\"},
                  {\"name\": \"Error\", \"value\": \"${ERROR_MSG}\"},
                  {\"name\": \"Run log\", \"value\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
                ]
              }]
            }"
